<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Belak | Gaming Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --primary-bg: #09090b;
            --accent-color: #3b82f6; 
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-hover: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #020617);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            width: 340px;
            padding: 40px 20px;
            text-align: center;
        }

        .profile img {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 2px solid var(--accent-color);
            object-fit: cover; /* Ensures your photo doesn't look stretched */
            box-shadow: 0 0 25px rgba(59, 130, 246, 0.4);
            transition: transform 0.4s ease;
            margin-bottom: 10px;
        }

        .profile img:hover {
            transform: scale(1.05);
        }

        h1 {
            margin: 10px 0 5px;
            font-size: 2rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .subtitle {
            font-size: 0.9rem;
            color: #94a3b8;
            margin-bottom: 30px;
        }

        .link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            text-decoration: none;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 16px;
            margin: 12px 0;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .link:hover {
            background: var(--card-hover);
            border-color: var(--accent-color);
            transform: translateY(-3px);
        }

        .link i {
            font-size: 22px;
        }

        footer {
            margin-top: 40px;
            font-size: 0.8rem;
            color: #64748b;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="profile">
            <img src="Profile.jpeg" alt="Belak Profile">
            <h1>BELAK</h1>
            <p class="subtitle">Competitive Gamer & Content Creator</p>
        </div>

        <a class="link" href="https://www.tiktok.com/@belakxx" target="_blank">
            <i class="fa-brands fa-tiktok"></i> TikTok
        </a>

        <a class="link" href="https://www.youtube.com/@Belakplays" target="_blank">
            <i class="fa-brands fa-youtube"></i> YouTube
        </a>

        <a class="link" href="https://discord.gg/jCfg2hex" target="_blank">
            <i class="fa-brands fa-discord"></i> Discord
        </a>

        <a class="link" href="https://www.instagram.com/belaktesfaye" target="_blank">
            <i class="fa-brands fa-instagram"></i> Instagram
        </a>

        <footer>
            BelakXx's Gaming
        </footer>
    </div>

</body>
</html>
