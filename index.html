<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Belak | Gaming Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #00d4ff;
            --accent-color: #7289da;
            --text-main: #ffffff;
            /* Using a high-quality dark gaming setup 4K image */
            --bg-image: url('https://images.unsplash.com/photo-1542751371-adc38448a05e?auto=format&fit=crop&q=80&w=2070');
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.8)), var(--bg-image);
            background-size: cover;
            background-position: center;
            background-attachment: fixed; /* Keeps image still while scrolling */
            background-repeat: no-repeat;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            /* Glassmorphism Effect */
            background: rgba(26, 26, 32, 0.75);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            
            width: 100%;
            max-width: 420px;
            padding: 40px 30px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .profile-img {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--primary-color);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
            margin-bottom: 20px;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            letter-spacing: 3px;
            margin-bottom: 8px;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
        }

        .subtitle {
            font-size: 1rem;
            color: #ccc;
            margin-bottom: 35px;
            font-weight: bold;
            letter-spacing: 1.5px;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .link-card {
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.08);
            padding: 16px;
            border-radius: 14px;
            text-decoration: none;
            color: white;
            font-weight: 600;
            font-size: 1.1rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .link-card i {
            margin-right: 12px;
            font-size: 1.3rem;
        }

        .link-card:hover {
            transform: scale(1.03);
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }

        /* Neon Borders on Hover */
        .tiktok:hover { border-color: #ff0050; color: #ff0050; }
        .youtube:hover { border-color: #ff0000; color: #ff0000; }
        .discord:hover { border-color: #7289da; color: #7289da; }
        .instagram:hover { border-color: #e1306c; color: #e1306c; }

        footer {
            margin-top: 40px;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 2px;
        }

        /* Mobile Optimization */
        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
            }
            h1 { font-size: 1.6rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="Profile.jpeg" alt="Belak" class="profile-img">

        <h1>BELAK</h1>
        <p class="subtitle">Competitive Gamer</p>

        <div class="links-container">
            <a href="https://www.tiktok.com/@belakxx" target="_blank" class="link-card tiktok">
                <i class="fab fa-tiktok"></i> TikTok
            </a>
            
            <a href="https://www.youtube.com/@Belakplays" target="_blank" class="link-card youtube">
                <i class="fab fa-youtube"></i> YouTube
            </a>

            <a href="https://discord.gg/jCfg2hex" target="_blank" class="link-card discord">
                <i class="fab fa-discord"></i> Discord
            </a>

            <a href="https://www.instagram.com/belakxx" target="_blank" class="link-card instagram">
                <i class="fab fa-instagram"></i> Instagram
            </a>
        </div>

        <footer>
            BELAKXX &bull; 2024
        </footer>
    </div>

</body>
</html>
